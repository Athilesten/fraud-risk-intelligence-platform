apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api
  namespace: fraud-risk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-api
  template:
    metadata:
      labels:
        app: fraud-api
    spec:
      containers:
        - name: fraud-api
          image: fraud-risk-api:CHANGE_ME
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: fraud-postgres-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
